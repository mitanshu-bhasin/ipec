<!-- Admin Navbar Component -->
<header
    class="h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-4 md:px-8 sticky top-0 z-10 shadow-sm/50">
    <div class="flex items-center gap-4">
        <button onclick="toggleSidebar()"
            class="lg:hidden text-slate-500 dark:text-slate-400 hover:text-green-600 transition">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
        <h2 id="page-title" class="text-lg font-bold text-slate-800 dark:text-slate-100">Dashboard</h2>
    </div>

    <div class="flex items-center gap-3">
        <div
            class="hidden md:flex px-3 py-1 bg-green-50 text-green-700 border border-green-200 rounded-full text-xs font-bold items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> SYSTEM LIVE
        </div>

        <button onclick="toggleTheme()"
            class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-yellow-400 hover:bg-slate-200 dark:hover:bg-slate-600 transition flex items-center justify-center border border-slate-200 dark:border-slate-600">
            <i class="fa-solid fa-moon theme-toggle-icon"></i>
        </button>
    </div>
</header>
