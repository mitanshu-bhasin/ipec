<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPEC - System Controls</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }

        .hidden {
            display: none !important;
        }
    </style>
    <script src="env.js"></script>
</head>

<body>

    <div id="auth-check" class="text-center">
        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
        <h2 class="text-xl">Verifying Access...</h2>
    </div>

    <div id="login-container" class="hidden bg-slate-800 p-8 rounded-xl shadow-2xl max-w-sm w-full text-center">
        <h2 class="text-2xl font-bold mb-6 text-slate-100">Super Admin Login</h2>
        <input type="email" id="login-email" placeholder="Email"
            class="w-full p-3 mb-4 rounded bg-slate-700 text-white outline-none">
        <input type="password" id="login-password" placeholder="Password"
            class="w-full p-3 mb-6 rounded bg-slate-700 text-white outline-none">
        <button id="login-btn"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition">Login</button>
        <p id="login-error" class="text-red-400 text-sm mt-4 hidden"></p>
    </div>

    <div id="main-content" class="hidden bg-slate-800 p-8 rounded-xl shadow-2xl max-w-md w-full text-center">
        <i class="fa-solid fa-shield-halved text-5xl text-emerald-500 mb-4"></i>
        <h1 class="text-2xl font-bold text-slate-100 mb-2">Master Override</h1>
        <p class="text-slate-400 mb-8 text-sm">Authorized personnel only.</p>

        <div class="p-6 bg-slate-900 rounded-lg border border-slate-700 mb-6 flex flex-col items-center">
            <h3 class="text-lg font-bold text-slate-300 mb-2">Maintenance Mode</h3>
            <p class="text-xs text-slate-500 mb-4">When enabled, all users (except super admins) will be force-logged
                out and blocked from accessing admin.html and emp.html.</p>
            <div id="status-indicator"
                class="text-sm font-bold px-3 py-1 rounded inline-block mb-4 bg-slate-700 text-slate-400">Checking
                Status...</div>
            <button id="toggle-m-btn"
                class="w-full px-6 py-3 rounded font-bold transition flex items-center justify-center gap-2 opacity-50 cursor-not-allowed text-white"
                disabled>
                <i class="fa-solid fa-power-off"></i> <span>Please Wait...</span>
            </button>
        </div>

        <button id="logout-btn" class="text-slate-500 hover:text-white transition text-sm underline mt-4">Sign
            Out</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: window.ENV.FIREBASE_API_KEY,
            authDomain: window.ENV.FIREBASE_AUTH_DOMAIN,
            projectId: window.ENV.FIREBASE_PROJECT_ID,
            storageBucket: window.ENV.FIREBASE_STORAGE_BUCKET,
            messagingSenderId: window.ENV.FIREBASE_MESSAGING_SENDER_ID,
            appId: window.ENV.FIREBASE_APP_ID
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ALLOWED_EMAILS = ['mfskufgu@gmail.com', 'info@fouralpha.org'];
        let currentMaintenanceState = false;

        const uiElements = {
            auth: document.getElementById('auth-check'),
            login: document.getElementById('login-container'),
            main: document.getElementById('main-content'),
            toggleBtn: document.getElementById('toggle-m-btn'),
            statusInd: document.getElementById('status-indicator'),
            err: document.getElementById('login-error')
        };

        async function fetchMaintenanceStatus() {
            try {
                const docRef = doc(db, "settings", "global");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists() && docSnap.data().maintenanceMode === true) {
                    currentMaintenanceState = true;
                    uiElements.statusInd.className = "text-sm font-bold px-3 py-1 rounded inline-block mb-4 bg-red-900/50 text-red-400 border border-red-800";
                    uiElements.statusInd.textContent = "Currently: ENABLED";

                    uiElements.toggleBtn.className = "w-full px-6 py-3 rounded font-bold transition flex items-center justify-center gap-2 text-white bg-green-600 hover:bg-green-700 shadow-lg";
                    uiElements.toggleBtn.innerHTML = `<i class="fa-solid fa-play"></i> Turn OFF Maintenance`;
                } else {
                    currentMaintenanceState = false;
                    uiElements.statusInd.className = "text-sm font-bold px-3 py-1 rounded inline-block mb-4 bg-emerald-900/50 text-emerald-400 border border-emerald-800";
                    uiElements.statusInd.textContent = "Currently: DISABLED (Live)";

                    uiElements.toggleBtn.className = "w-full px-6 py-3 rounded font-bold transition flex items-center justify-center gap-2 text-white bg-red-600 hover:bg-red-700 shadow-lg";
                    uiElements.toggleBtn.innerHTML = `<i class="fa-solid fa-power-off"></i> Turn ON Maintenance`;
                }

                uiElements.toggleBtn.disabled = false;
            } catch (error) {
                console.error("Error fetching status:", error);
                uiElements.statusInd.textContent = "Error fetching status";
            }
        }

        uiElements.toggleBtn.addEventListener('click', async () => {
            uiElements.toggleBtn.disabled = true;
            uiElements.toggleBtn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Updating...`;
            try {
                const newState = !currentMaintenanceState;
                await setDoc(doc(db, "settings", "global"), { maintenanceMode: newState }, { merge: true });
                await fetchMaintenanceStatus();
            } catch (e) {
                console.error("Update failed", e);
                alert("Failed to update status: " + e.message);
                uiElements.toggleBtn.disabled = false;
            }
        });

        onAuthStateChanged(auth, (user) => {
            uiElements.auth.classList.add('hidden');
            if (user) {
                if (ALLOWED_EMAILS.includes(user.email)) {
                    uiElements.login.classList.add('hidden');
                    uiElements.main.classList.remove('hidden');
                    fetchMaintenanceStatus();
                } else {
                    alert("Unauthorized Access.");
                    signOut(auth);
                }
            } else {
                uiElements.login.classList.remove('hidden');
                uiElements.main.classList.add('hidden');
            }
        });

        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            uiElements.err.classList.add('hidden');
            if (!email || !pass) return;

            document.getElementById('login-btn').textContent = "Logging in...";
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                uiElements.err.textContent = error.message;
                uiElements.err.classList.remove('hidden');
                document.getElementById('login-btn').textContent = "Login";
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth);
        });
    </script>
</body>

</html>
